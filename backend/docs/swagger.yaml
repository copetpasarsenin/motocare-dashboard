info:
  contact:
    email: admin@motocare.test
    name: MotoCare Dashboard
  description: |-
    REST API for MotoCare Dashboard motorcycle service booking and management.
    Use the Authorize button with this format: Bearer <token>.
  license:
    name: MIT
  termsOfService: http://swagger.io/terms/
  title: MotoCare Dashboard API
  version: "1.0"
paths:
  /api/bookings:
    get:
      description: JWT required. Admin sees all bookings, user sees only their own
        bookings.
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: limit
        type: integer
      - description: Search customer, phone, vehicle name, or plate
        in: query
        name: search
        type: string
      - description: Filter by status
        enum:
        - pending
        - confirmed
        - in_progress
        - completed
        - cancelled
        in: query
        name: status
        type: string
      - description: Sort column
        enum:
        - id
        - customer_name
        - booking_date
        - status
        - created_at
        in: query
        name: sort_by
        type: string
      - description: Sort order
        enum:
        - asc
        - desc
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/handlers.BookingListResponseDoc'
        "400":
          description: query tidak valid
          schema:
            $ref: '#/definitions/handlers.ErrorResponseDoc'
        "401":
          description: token tidak valid
          schema:
            $ref: '#/definitions/handlers.ErrorResponseDoc'
        "500":
          description: server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: List bookings
      tags:
      - Bookings
    post:
      consumes:
      - application/json
      description: JWT required. User creates a booking for their own account. User-created
        bookings must be pending.
      parameters:
      - description: Booking request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.BookingRequestDoc'
      produces:
      - application/json
      responses:
        "201":
          description: booking berhasil dibuat
          schema:
            $ref: '#/definitions/handlers.BookingResponseDoc'
        "400":
          description: validasi gagal
          schema:
            $ref: '#/definitions/handlers.ErrorResponseDoc'
        "401":
          description: token tidak valid
          schema:
            $ref: '#/definitions/handlers.ErrorResponseDoc'
        "403":
          description: akses ditolak
          schema:
            $ref: '#/definitions/handlers.ErrorResponseDoc'
        "500":
          description: server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: Create booking
      tags:
      - Bookings
  /api/bookings/{id}:
    delete:
      description: Admin only. Delete booking.
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: booking berhasil dihapus
          schema:
            $ref: '#/definitions/handlers.MessageResponseDoc'
        "400":
          description: id tidak valid
          schema:
            $ref: '#/definitions/handlers.ErrorResponseDoc'
        "401":
          description: token tidak valid
          schema:
            $ref: '#/definitions/handlers.ErrorResponseDoc'
        "403":
          description: akses ditolak
          schema:
            $ref: '#/definitions/handlers.ErrorResponseDoc'
        "404":
          description: booking tidak ditemukan
          schema:
            $ref: '#/definitions/handlers.ErrorResponseDoc'
        "500":
          description: server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: Delete booking
      tags:
      - Bookings
    get:
      description: JWT required. Admin can view any booking, user can view only their
        own booking.
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: booking berhasil diambil
          schema:
            $ref: '#/definitions/handlers.BookingResponseDoc'
        "400":
          description: id tidak valid
          schema:
            $ref: '#/definitions/handlers.ErrorResponseDoc'
        "401":
          description: token tidak valid
          schema:
            $ref: '#/definitions/handlers.ErrorResponseDoc'
        "403":
          description: akses ditolak
          schema:
            $ref: '#/definitions/handlers.ErrorResponseDoc'
        "404":
          description: booking tidak ditemukan
          schema:
            $ref: '#/definitions/handlers.ErrorResponseDoc'
        "500":
          description: server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: Get booking detail
      tags:
      - Bookings
    put:
      consumes:
      - application/json
      description: Admin only. Update booking status.
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        type: integer
      - description: Booking status request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.BookingStatusRequestDoc'
      produces:
      - application/json
      responses:
        "200":
          description: status booking berhasil diubah
          schema:
            $ref: '#/definitions/handlers.BookingResponseDoc'
        "400":
          description: validasi gagal
          schema:
            $ref: '#/definitions/handlers.ErrorResponseDoc'
        "401":
          description: token tidak valid
          schema:
            $ref: '#/definitions/handlers.ErrorResponseDoc'
        "403":
          description: akses ditolak
          schema:
            $ref: '#/definitions/handlers.ErrorResponseDoc'
        "404":
          description: booking tidak ditemukan
          schema:
            $ref: '#/definitions/handlers.ErrorResponseDoc'
        "500":
          description: server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponseDoc'
      security:
      - BearerAuth: []
      summary: Update booking status
      tags:
      - Bookings
  /api/categories:
    get:
      description: Public endpoint to list service categories.
